version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      target: production
    restart: unless-stopped
    working_dir: /app
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://${DB_USER:-lvs_user}:${DB_PASSWORD:-068c1479a826090aa922d4813f6ad461}@database:5432/${DB_NAME:-lvs_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-5d461dc2bd74213aa7f5a6443e0950dd}@redis:6379
      - PORT=3000
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://lvs.co.kr}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-poVoBClc7OK9y1+WmpsO4ypFSkBZ+XhVkOns/C40tCk=}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://lvs.co.kr}
      - NEXT_PUBLIC_KAKAO_MAP_KEY=${NEXT_PUBLIC_KAKAO_MAP_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - app-network
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 1g
    memswap_limit: 1536m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://0.0.0.0:3000/', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=d9dr3vdf9alez7mjz06uroz0"
      - "traefik.http.services.lvs-app.loadbalancer.server.port=3000"

  database:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-lvs_db}
      - POSTGRES_USER=${DB_USER:-lvs_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-068c1479a826090aa922d4813f6ad461}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    mem_limit: 512m
    memswap_limit: 768m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lvs_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-5d461dc2bd74213aa7f5a6443e0950dd}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    mem_limit: 256m
    memswap_limit: 384m
    logging: *default-logging

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
